<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing Game</title>
    <link rel="stylesheet" href="guess.css">
</head>
<body>
  <div class="container">
    <h1>Guess the Number</h1>
    <label for="guess">Enter a number (1-10) : </label><br>
    <input type="number" id="guess" min="1" max="10"><br>
    <button id="guessBtn">Submit</button>
    <p id="feedback"></p>
    <div class="footer">
        <p>Can you guess the correct number?</p>
    </div>
    <script src="guess.js"></script>
  </div>
</body>
</html>
